! FRR configuration for frr1 (AS 65000)
!
hostname frr1
!
router bgp 65000
 bgp router-id 172.30.0.2
 neighbor 172.30.0.3 remote-as 65001
 !
 address-family ipv4 unicast
  neighbor 172.30.0.3 activate
  network 192.0.2.0/24
 exit-address-family
 !
 ! BMP configuration (syntax may vary by FRR version)
 ! If 'bmp' commands are not recognized, ensure the BMP module is loaded
 ! or update to a newer FRR image.
 bmp mirror buffer-limit 0
 bmp targets frr-lab
 bmp listener 172.30.0.10 port 1790
!
